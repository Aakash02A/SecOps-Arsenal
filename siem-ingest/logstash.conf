# Sample Logstash configuration for Apache/Nginx web logs
# To use this, you would run Logstash with: bin/logstash -f logstash.conf

input {
  # Read from a local file
  file {
    path => "/path/to/your/access.log"
    start_position => "beginning"
    sincedb_path => "/dev/null" # Do not remember where we left off (useful for testing)
  }
}

filter {
  # Parse standard Apache combined logs
  grok {
    match => { "message" => "%{COMBINEDAPACHELOG}" }
  }
  
  # Set the timestamp of the event to the time extracted from the log
  date {
    match => [ "timestamp" , "dd/MMM/yyyy:HH:mm:ss Z" ]
  }
  
  # Extract GeoIP data based on the client IP
  geoip {
    source => "clientip"
  }
}

output {
  # Send structured data to Elasticsearch
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "web-logs-%{+YYYY.MM.dd}"
  }
  
  # Also print to console for debugging
  stdout { 
    codec => rubydebug 
  }
}
